global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'biz-bot'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
          # - alertmanager:9093

# Load rules once and periodically evaluate them
rule_files:
  - "alerts.yml"

# Scrape configurations
scrape_configs:
  # Biz-Bot application metrics
  - job_name: 'biz-bot-app'
    static_configs:
      - targets: ['app:3000']
        labels:
          service: 'biz-bot'
          environment: 'production'
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node exporter for system metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'system'
